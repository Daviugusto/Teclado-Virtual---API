<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Teclado Virtual</title>
</head>

<body>
    <main>
        <section class="searchResult">
            <div class="search">
                <input type="text" placeholder="Pesquise aqui" class="searchi" />
                <button onclick="buscar()">Buscar</button>
            </div>
            <div class="Results">
                <script async src="https://cse.google.com/cse.js?cx=23d80b5b4feec4d26">
                </script>
            </div>
        </section>
        <section class="Keyboard">
            <div class="background">
                <div class="keycaps">
                    <button class="keycap" onclick="clickLetter('A')">A</button>
                    <button class="keycap" onclick="clickLetter('B')">B</button>
                    <button class="keycap" onclick="clickLetter('C')">C</button>
                    <button class="keycap" onclick="clickLetter('D')">D</button>
                    <button class="keycap" onclick="clickLetter('E')">E</button>
                    <button class="keycap" onclick="clickLetter('F')">F</button>
                    <button class="keycap" onclick="clickLetter('G')">G</button>
                    <button class="keycap" onclick="clickLetter('H')">H</button>
                    <button class="keycap" onclick="clickLetter('I')">I</button>
                    <button class="keycap" onclick="clickLetter('J')">J</button>
                    <button class="keycap" onclick="clickLetter('K')">K</button>
                    <button class="keycap" onclick="clickLetter('L')">L</button>
                    <button class="keycap" onclick="clickLetter('M')">M</button>
                    <button class="keycap" onclick="clickLetter('N')">N</button>
                    <button class="keycap" onclick="clickLetter('O')">O</button>
                    <button class="keycap" onclick="clickLetter('P')">P</button>
                    <button class="keycap" onclick="clickLetter('Q')">Q</button>
                    <button class="keycap" onclick="clickLetter('R')">R</button>
                    <button class="keycap" onclick="clickLetter('S')">S</button>
                    <button class="keycap" onclick="clickLetter('T')">T</button>
                    <button class="keycap" onclick="clickLetter('U')">U</button>
                    <button class="keycap" onclick="clickLetter('V')">V</button>
                    <button class="keycap" onclick="clickLetter('W')">W</button>
                    <button class="keycap" onclick="clickLetter('X')">X</button>
                    <button class="keycap" onclick="clickLetter('Y')">Y</button>
                    <button class="keycap" onclick="clickLetter('Z')">Z</button>
                    <button class="keycap" onclick="enter()">ENTER</button>
                    <button class="keycap" onclick="backspace()">BACKSPACE</button>
                    <button class="keycap" onclick="addSpace()">SPACE</button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
